<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <script src="/telegram-web-app.js"></script>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>S•NOVA AI</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Глобальный диагностический скрипт: выводит в консоль (F12) каждый ваш клик
      window.addEventListener('click', (e) => {
        console.log('DEBUG: Нажат элемент:', e.target);
        if (getComputedStyle(e.target).pointerEvents === 'none') {
            console.warn('DEBUG WARNING: У элемента отключены pointer-events (нажатие блокируется)!');
            e.target.style.pointerEvents = 'auto'; // Попытка авто-исправления "на лету"
        }
      }, true);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
