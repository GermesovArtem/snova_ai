
services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nanobanana}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: sh -c "sleep 5 && uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - api

  bot:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    command: sh -c "sleep 5 && python -m bot.main"

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    command: caddy reverse-proxy --from fragmentx.tech --to frontend:80
    depends_on:
      - frontend
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
