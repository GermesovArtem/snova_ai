
x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nanobanana}
    volumes:
      - pgdata:/var/lib/postgresql/data
    <<: *default-logging

  api:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: sh -c "sleep 5 && uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    <<: *default-logging

  frontend:
    build: ./frontend
    restart: always
    expose:
      - "80"
    depends_on:
      - api
    <<: *default-logging

  bot:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    command: sh -c "sleep 5 && python -m bot.main"
    <<: *default-logging

  caddy:
    image: caddy:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    <<: *default-logging

volumes:
  pgdata:
  caddy_data:
  caddy_config:
