
services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nanobanana
    ports:
      - "5432:5432"
    volumes:
      - pgdata_v2:/var/lib/postgresql/data

  api:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: sh -c "sleep 5 && uvicorn backend.main:app --host 0.0.0.0 --port 8000"

  bot:
    build: .
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    command: sh -c "sleep 5 && python -m bot.main"

volumes:
  pgdata_v2:
